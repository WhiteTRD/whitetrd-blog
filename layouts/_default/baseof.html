<!DOCTYPE html>
<html lang="{{ .Site.LanguageCode | default "uk" }}">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="color-scheme" content="light dark">
  <title>{{ if not .IsHome }}{{ .Title }} | {{ end }}{{ .Site.Title }}</title>
  <meta name="description" content="{{ with .Description }}{{ . }}{{ else }}{{ .Site.Params.description }}{{ end }}">
  <link rel="canonical" href="{{ .Permalink }}">
  <link rel="alternate" type="application/rss+xml" title="{{ .Site.Title }}" href="{{ "index.xml" | absURL }}">
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:ital,wght@0,300;0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">

  {{/* OG Meta */}}
  <meta property="og:title" content="{{ .Title | default .Site.Title }}">
  <meta property="og:type" content="{{ if .IsPage }}article{{ else }}website{{ end }}">
  <meta property="og:url" content="{{ .Permalink }}">
  <meta property="og:description" content="{{ with .Description }}{{ . }}{{ else }}{{ .Site.Params.description }}{{ end }}">
  <meta property="og:site_name" content="{{ .Site.Title }}">

  {{ if .Params.private }}<meta name="robots" content="noindex, nofollow">{{ end }}

  {{ partial "schema.html" . }}
  <script>var t=localStorage.getItem('theme');if(t)document.documentElement.setAttribute('data-theme',t);</script>
  <style>
    :root {
      --bg-primary: #fafafa;
      --bg-secondary: #f0f0f0;
      --bg-tertiary: #e5e5e5;
      --text-primary: #1a1a1a;
      --text-secondary: #666666;
      --text-tertiary: #999999;
      --accent: #555555;
      --accent-hover: #333333;
      --border-primary: #d0d0d0;
      --border-secondary: #e0e0e0;
      --shadow-sm: 0 1px 2px rgba(0,0,0,0.06);
      --shadow-md: 0 2px 8px rgba(0,0,0,0.1);
      --selection-bg: #d0d0d0;
      --selection-text: #1a1a1a;
      --code-bg: #f0f0f0;
      --callout-bg: #f0f0f0;
      --callout-warning: #cc3333;
      --callout-insight: #2d8a56;
      --callout-info: #3366cc;
      --green: #2d8a56;
    }

    @media (prefers-color-scheme: dark) {
      :root:not([data-theme="light"]):not([data-theme="lime"]) {
        --bg-primary: #0a0a0a;
        --bg-secondary: #141414;
        --bg-tertiary: #1a1a1a;
        --text-primary: #d4d4d4;
        --text-secondary: #888888;
        --text-tertiary: #555555;
        --accent: #999999;
        --accent-hover: #b0b0b0;
        --border-primary: #333333;
        --border-secondary: #1a1a1a;
        --shadow-sm: none;
        --shadow-md: none;
        --selection-bg: #333333;
        --selection-text: #d4d4d4;
        --code-bg: #141414;
        --callout-bg: #141414;
        --callout-warning: #f87171;
        --callout-insight: #34d399;
        --callout-info: #60a5fa;
        --green: #34d399;
      }
    }

    [data-theme="dark"] {
      --bg-primary: #0a0a0a;
      --bg-secondary: #141414;
      --bg-tertiary: #1a1a1a;
      --text-primary: #d4d4d4;
      --text-secondary: #888888;
      --text-tertiary: #555555;
      --accent: #999999;
      --accent-hover: #b0b0b0;
      --border-primary: #333333;
      --border-secondary: #1a1a1a;
      --shadow-sm: none;
      --shadow-md: none;
      --selection-bg: #333333;
      --selection-text: #d4d4d4;
      --code-bg: #141414;
      --callout-bg: #141414;
      --callout-warning: #f87171;
      --callout-insight: #34d399;
      --callout-info: #60a5fa;
      --green: #34d399;
    }

    [data-theme="lime"] {
      --bg-primary: #0d0d0d;
      --bg-secondary: #141414;
      --bg-tertiary: #1a1a1a;
      --text-primary: #d4d4d4;
      --text-secondary: #6b6b6b;
      --text-tertiary: #555555;
      --accent: #4ec970;
      --accent-hover: #5dd97f;
      --border-primary: #252525;
      --border-secondary: #1a1a1a;
      --shadow-sm: none;
      --shadow-md: none;
      --selection-bg: rgba(78, 201, 112, 0.25);
      --selection-text: #eeeeee;
      --code-bg: #141414;
      --callout-bg: #141414;
      --callout-warning: #e2b74b;
      --callout-insight: #4ec970;
      --callout-info: #5b9bd5;
      --green: #4ec970;
    }

    pre span {
      color: var(--text-primary) !important;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    @keyframes blink { 50% { opacity: 0; } }

    html {
      background: var(--bg-primary);
    }

    body {
      font-family: 'JetBrains Mono', monospace;
      max-width: 780px;
      margin: 0 auto;
      padding: 48px 24px 96px;
      font-size: 14px;
      line-height: 1.7;
      -webkit-font-smoothing: antialiased;
      background: var(--bg-primary);
      color: var(--text-primary);
      min-height: 100vh;
    }

    ::selection {
      background: var(--selection-bg);
      color: var(--selection-text);
    }

    strong, b {
      color: var(--text-primary);
      font-weight: 500;
    }

    a {
      color: var(--accent);
      text-decoration: none;
      transition: color 0.15s;
    }

    a:hover {
      color: var(--accent-hover);
    }

    a:visited {
      color: var(--accent);
    }

    h1, h2, h3 {
      font-weight: 600;
    }

    h1 {
      font-size: 22px;
      margin-bottom: 6px;
      line-height: 1.3;
      letter-spacing: -0.02em;
      color: var(--text-primary);
    }

    h2 {
      font-size: 16px;
      color: var(--text-primary);
      margin: 48px 0 16px;
      border-bottom: none;
      padding-bottom: 0;
      text-transform: none;
      letter-spacing: normal;
    }
    h2::before {
      content: "## ";
      color: var(--text-tertiary);
      font-weight: 400;
    }

    h3 {
      font-size: 14px;
      margin-top: 24px;
      margin-bottom: 8px;
    }

    p {
      margin-bottom: 16px;
      color: var(--text-primary);
    }

    ul, ol {
      margin: 12px 0;
      padding: 0 0 0 1.2em;
    }

    li {
      margin-bottom: 4px;
    }

    hr {
      border: none;
      border-top: 1px solid var(--border-primary);
      margin: 40px 0;
    }

    .author {
      color: var(--text-secondary);
      font-size: 12px;
      margin-bottom: 8px;
    }

    .intro {
      color: var(--text-secondary);
      margin-bottom: 8px;
    }

    pre {
      background: var(--code-bg) !important;
      border: 1px solid var(--border-primary);
      border-radius: 6px;
      padding: 16px 20px;
      overflow-x: auto;
      font-size: 13px;
      line-height: 1.7;
      margin: 24px 0;
      color: var(--text-primary) !important;
      white-space: pre;
    }

    pre::-webkit-scrollbar {
      height: 6px;
    }

    pre::-webkit-scrollbar-track {
      background: transparent;
    }

    pre::-webkit-scrollbar-thumb {
      background: var(--border-primary);
      border-radius: 3px;
    }

    code {
      font-family: inherit;
      background: var(--code-bg);
      padding: 1px 4px;
      border-radius: 3px;
    }

    pre code {
      background: none;
      padding: 0;
      border-radius: 0;
    }

    img {
      max-width: 100%;
      height: auto;
      display: block;
    }

    figure {
      margin: 24px 0;
      max-width: 100%;
    }

    figcaption {
      font-size: 13px;
      color: var(--text-secondary);
      margin-top: 6px;
    }

    .chart-embed {
      margin: 24px 0;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .chart-embed iframe {
      width: 100%;
      max-width: 780px;
      aspect-ratio: 600 / 380;
      border: none;
      border-radius: 8px;
    }

    blockquote {
      border-left: 3px solid var(--border-primary);
      margin: 20px 0;
      padding: 8px 16px;
      font-style: italic;
      background: var(--bg-secondary) !important;
    }

    blockquote p {
      margin: 0;
    }

    /* ─── Table ─── */
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
      margin: 24px 0;
      border: 1px solid var(--border-primary);
      border-radius: 6px;
      overflow: hidden;
    }

    th {
      text-align: left;
      padding: 10px 14px;
      background: var(--bg-secondary);
      color: var(--text-secondary);
      font-weight: 500;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      border-bottom: 1px solid var(--border-primary);
    }

    td {
      padding: 9px 14px;
      border-bottom: 1px solid var(--border-primary);
      color: var(--text-primary);
    }

    tr:last-child td { border-bottom: none; }
    tr:hover td { background: var(--bg-secondary); }
    td:first-child { color: var(--green); font-weight: 500; }

    .callout {
      border: 1px solid var(--border-primary);
      padding: 12px 16px;
      margin: 20px 0;
      border-radius: 6px;
      background: var(--callout-bg);
    }

    .callout.warning {
      border-left: 3px solid var(--callout-warning);
    }

    .callout.insight {
      border-left: 3px solid var(--callout-insight);
    }

    .callout.cta {
      border: 2px solid var(--border-primary);
      padding: 16px 20px;
    }

    .callout.cta strong {
      font-size: 15px;
    }

    .callout strong {
      display: block;
      margin-bottom: 4px;
    }

    .callout p {
      margin-bottom: 0;
    }

    .callout.info {
      border-left: 3px solid var(--callout-info);
    }

    /* ─── Tags ─── */
    .tags {
      margin: 8px 0 40px;
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .tag {
      font-size: 11px;
      padding: 2px 10px;
      border-radius: 3px;
      text-decoration: none;
      color: var(--green);
      background: rgba(78, 201, 112, 0.08);
      border: none;
      transition: background 0.15s;
    }

    .tag:visited {
      color: var(--green);
    }

    .tag:hover {
      background: rgba(78, 201, 112, 0.15);
      color: var(--green);
    }

    .posts {
      list-style: none;
      padding: 0;
    }

    .posts li {
      margin-bottom: 12px;
    }

    .date {
      color: var(--text-secondary);
      font-size: 13px;
      margin-right: 8px;
    }

    .excerpt {
      color: var(--text-tertiary);
      font-size: 13px;
    }

    .youtube-preview {
      margin: 20px 0;
    }

    .youtube-preview iframe {
      width: 100%;
      aspect-ratio: 16/9;
      border: none;
    }

    .sources {
      margin-top: 40px;
      padding-top: 20px;
      border-top: 1px solid var(--border-primary);
    }

    .sources h3 {
      font-size: 14px;
      margin-bottom: 8px;
    }

    .sources ul {
      list-style: none;
      padding: 0;
    }

    .sources li {
      margin-bottom: 4px;
    }

    .related-posts {
      margin-top: 30px;
      padding-top: 20px;
      border-top: 1px solid var(--border-primary);
    }

    .related-posts h3 {
      font-size: 14px;
      margin-bottom: 8px;
    }

    .related-posts ul {
      list-style: none;
      padding: 0;
    }

    .related-posts li {
      margin-bottom: 4px;
    }

    .subscribe-inline {
      font-size: 14px;
      margin: 30px 0 20px;
    }

    /* ─── Breadcrumb ─── */
    .prompt-nav {
      margin-bottom: 40px;
      font-size: 13px;
      color: var(--text-secondary);
    }

    .prompt-nav a {
      color: var(--text-secondary);
      text-decoration: none;
      transition: color 0.15s;
    }

    .prompt-nav a:hover {
      color: var(--text-primary);
    }

    .prompt-sep {
      color: var(--text-tertiary);
    }

    .prompt-current {
      color: var(--text-primary);
    }

    .prompt-dollar {
      color: var(--text-tertiary);
    }

    /* ─── Directory listing ─── */
    .dir-listing {
      margin: 16px 0;
      padding-left: 16px;
    }

    .dir-entry {
      line-height: 1.8;
    }

    .dir-count {
      color: var(--text-secondary);
      margin-left: 12px;
    }

    /* Focus visible */
    :focus-visible {
      outline: 2px solid var(--accent);
      outline-offset: 2px;
    }

    /* ─── Footer ─── */
    footer {
      margin-top: 64px;
      padding-top: 24px;
      border-top: 1px solid var(--border-primary);
      font-size: 12px;
      color: var(--text-secondary);
    }

    .theme-toggle {
      position: fixed;
      bottom: 16px;
      right: 16px;
      background: var(--bg-secondary);
      border: 1px solid var(--border-primary);
      color: var(--text-secondary);
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
      padding: 4px 8px;
      cursor: pointer;
      border-radius: 3px;
      opacity: 0.6;
      transition: opacity 0.15s;
    }

    .theme-toggle:hover {
      opacity: 1;
    }

    @media (max-width: 600px) {
      body {
        padding: 32px 14px 64px;
      }

      h1 {
        font-size: 18px;
      }

      pre {
        padding: 12px;
      }
    }

    /* View Transitions */
    @view-transition { navigation: auto; }

    .prompt-nav { view-transition-name: breadcrumb; }
    main { view-transition-name: content; }

    ::view-transition-old(content) {
      animation: 150ms ease-out both fade-out-slide;
    }
    ::view-transition-new(content) {
      animation: 200ms ease-out both fade-in-slide;
    }

    @keyframes fade-out-slide {
      to { opacity: 0; transform: translateY(8px); }
    }
    @keyframes fade-in-slide {
      from { opacity: 0; transform: translateY(-8px); }
    }

    @media (prefers-reduced-motion: reduce) {
      ::view-transition-old(content),
      ::view-transition-new(content) {
        animation-duration: 0s;
      }
    }
  </style>
</head>
<body>
  {{ partial "breadcrumb.html" . }}
  <main>
    {{ block "main" . }}{{ end }}
  </main>
  <footer>
    <p>&copy; {{ now.Year }} {{ .Site.Params.author | default .Site.Title }}</p>
  </footer>
  <button class="theme-toggle" onclick="toggleTheme()" aria-label="Toggle theme"></button>
  <script>
    (function() {
      var d = document.documentElement;
      var b = document.querySelector('.theme-toggle');
      var saved = localStorage.getItem('theme');
      var themes = ['light', 'dark', 'lime'];
      if (saved) d.setAttribute('data-theme', saved);

      function current() {
        var t = d.getAttribute('data-theme');
        if (t) return t;
        return matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
      }

      function label(t) {
        var next = themes[(themes.indexOf(t) + 1) % themes.length];
        return next;
      }

      function update() {
        b.textContent = label(current());
      }

      update();
      matchMedia('(prefers-color-scheme: dark)').addEventListener('change', update);

      window.toggleTheme = function() {
        var cur = current();
        var next = themes[(themes.indexOf(cur) + 1) % themes.length];
        d.setAttribute('data-theme', next);
        localStorage.setItem('theme', next);
        update();
      };
    })();
  </script>
</body>
</html>
