<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ETHUSDT · H4</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; overflow: hidden; }
    body {
      display: flex;
      align-items: center;
      justify-content: center;
    }
    svg { max-width: 100%; height: auto; }
    @media (prefers-color-scheme: dark) {
      body { background: #0a0a0a; }
    }
    @media (prefers-color-scheme: light) {
      body { background: #fafafa; }
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;

    const DARK = {
      bg: "#0a0a0a",
      bull: "#e0e0e0",
      bear: "#606060",
      wick: "#4a4a4a",
      zone: "#555",
      zoneFill: "#ffffff",
      accent: "#a0a0a0",
      dim: "#2a2a2a",
      dimmer: "#151515",
      text: "#909090",
      muted: "#606060",
      price: "#d4d4d4",
    };

    const LIGHT = {
      bg: "#fafafa",
      bull: "#1a1a1a",
      bear: "#a0a0a0",
      wick: "#c0c0c0",
      zone: "#999999",
      zoneFill: "#000000",
      accent: "#555555",
      dim: "#e0e0e0",
      dimmer: "#f0f0f0",
      text: "#777777",
      muted: "#999999",
      price: "#1a1a1a",
    };

    function useTheme() {
      const getSystemDark = () =>
        typeof window !== "undefined" &&
        window.matchMedia("(prefers-color-scheme: dark)").matches;

      const [dark, setDark] = useState(() => {
        if (typeof window !== "undefined" && window.__forcedTheme) {
          return window.__forcedTheme === "dark";
        }
        return getSystemDark();
      });

      useEffect(() => {
        const handler = (e) => {
          if (e.data && e.data.type === "theme") {
            const isDark = e.data.theme === "dark" || e.data.theme === "lime";
            window.__forcedTheme = isDark ? "dark" : "light";
            document.body.style.background = isDark ? "#0a0a0a" : "#fafafa";
            setDark(isDark);
          }
        };
        window.addEventListener("message", handler);

        const mq = window.matchMedia("(prefers-color-scheme: dark)");
        const mqHandler = (e) => {
          if (!window.__forcedTheme) {
            setDark(e.matches);
          }
        };
        mq.addEventListener("change", mqHandler);

        return () => {
          window.removeEventListener("message", handler);
          mq.removeEventListener("change", mqHandler);
        };
      }, []);

      return dark ? DARK : LIGHT;
    }

    const mono = { fontFamily: "'SF Mono','Fira Code','Consolas',monospace" };

    function Chart({ candles, zones, levels, fractals, storyline, title, width = 600, height = 380 }) {
      const S = useTheme();
      const p = { t: 32, b: 36, l: 52, r: 80 };
      const cW = width - p.l - p.r;
      const cH = height - p.t - p.b;

      if (!candles || candles.length === 0) return null;

      const allP = candles.flat();
      const dataHi = Math.max(...allP);
      const dataLo = Math.min(...allP);
      const margin = (dataHi - dataLo) * 0.08;
      const hi = dataHi + margin;
      const lo = dataLo - margin;

      const y = (v) => p.t + (1 - (v - lo) / (hi - lo)) * cH;
      const x = (i) => p.l + (i + 0.5) / candles.length * cW;
      const bw = Math.max(1.5, Math.min(5, cW / candles.length * 0.6));

      const range = hi - lo;
      const rawStep = range / 5;
      const mag = Math.pow(10, Math.floor(Math.log10(rawStep)));
      const steps = [1, 2, 5, 10];
      const step = steps.find(s => s * mag >= rawStep) * mag;
      const gridPrices = [];
      for (let pr = Math.ceil(lo / step) * step; pr <= hi; pr += step) {
        gridPrices.push(pr);
      }

      return (
        <svg width={width} height={height} style={{ display: "block", borderRadius: 8 }}>
          <rect width={width} height={height} fill={S.bg} rx={8} />

          {title && (
            <text x={p.l + 2} y={20} fill={S.muted} fontSize={10} {...mono}>{title}</text>
          )}

          {gridPrices.map((pr, i) => (
            <g key={`g${i}`}>
              <line x1={p.l} y1={y(pr)} x2={width - p.r} y2={y(pr)}
                stroke={S.dimmer} strokeWidth={0.5} />
              <text x={p.l - 6} y={y(pr) + 3} fill={S.muted} fontSize={9}
                textAnchor="end" {...mono}>{pr}</text>
            </g>
          ))}

          {(zones || []).map((z, zi) => {
            const ox1 = x(z.originStart) - bw;
            const ox2 = x(z.originEnd) + bw;
            const projX = width - p.r;
            const zH = Math.max(2, y(z.bot) - y(z.top));

            return (
              <g key={`z${zi}`}>
                <rect x={ox1} y={y(z.top)} width={ox2 - ox1} height={zH}
                  fill={S.zoneFill} opacity={0.08} rx={1} />
                <rect x={ox2} y={y(z.top)} width={projX - ox2} height={zH}
                  fill={S.zoneFill} opacity={0.04} />
                <line x1={ox1} y1={y(z.top)} x2={ox2} y2={y(z.top)}
                  stroke={S.zone} strokeWidth={0.8} opacity={0.5} />
                <line x1={ox1} y1={y(z.bot)} x2={ox2} y2={y(z.bot)}
                  stroke={S.zone} strokeWidth={0.8} opacity={0.5} />
                <line x1={ox2} y1={y(z.top)} x2={projX} y2={y(z.top)}
                  stroke={S.zone} strokeWidth={0.5} opacity={0.2} strokeDasharray="3,4" />
                <line x1={ox2} y1={y(z.bot)} x2={projX} y2={y(z.bot)}
                  stroke={S.zone} strokeWidth={0.5} opacity={0.2} strokeDasharray="3,4" />
                <text x={projX + 4} y={y(z.top) + 4}
                  fill={S.accent} fontSize={9} fontWeight={600} {...mono} opacity={0.85}>{z.label}</text>
                <text x={projX + 4} y={y(z.bot) - 2}
                  fill={S.muted} fontSize={8} {...mono} opacity={0.55}>{z.top}–{z.bot}</text>
              </g>
            );
          })}

          {(levels || []).map((l, i) => (
            <g key={`l${i}`}>
              <line x1={p.l} y1={y(l.val)} x2={width - p.r} y2={y(l.val)}
                stroke={S.zone} strokeWidth={0.4} opacity={0.2}
                strokeDasharray={l.dash ? "2,4" : "none"} />
              <text x={width - p.r + 4} y={y(l.val) + 3}
                fill={S.muted} fontSize={8} {...mono} opacity={0.55}>{l.label}</text>
            </g>
          ))}

          {candles.map(([o, h, l, c], i) => {
            const bull = c >= o;
            const cx = x(i);
            return (
              <g key={`c${i}`}>
                <line x1={cx} y1={y(h)} x2={cx} y2={y(l)}
                  stroke={S.wick} strokeWidth={0.6} opacity={0.35} />
                <rect x={cx - bw / 2} y={y(Math.max(o, c))}
                  width={bw} height={Math.max(0.5, Math.abs(y(o) - y(c)))}
                  fill={bull ? S.bg : S.bear}
                  stroke={bull ? S.bull : S.bear}
                  strokeWidth={0.7}
                  opacity={bull ? 0.9 : 0.7} />
              </g>
            );
          })}

          {(fractals || []).map((f, i) => {
            const cx = x(f.idx);
            const isHigh = f.type === "high";
            const cy = y(f.price) + (isHigh ? -8 : 10);
            return (
              <g key={`f${i}`}>
                <text x={cx} y={cy} fill={S.accent} fontSize={9}
                  textAnchor="middle" {...mono} opacity={0.7}>
                  {isHigh ? "▽" : "△"}
                </text>
                <text x={cx} y={cy + (isHigh ? -8 : 10)} fill={S.muted} fontSize={8}
                  textAnchor="middle" {...mono} opacity={0.55}>
                  {f.price}
                </text>
              </g>
            );
          })}

          {storyline && (
            <g>
              <line
                x1={x(storyline.pointA.idx)} y1={y(storyline.pointA.price)}
                x2={storyline.pointB.idx != null ? x(storyline.pointB.idx) : width - p.r}
                y2={y(storyline.pointB.price)}
                stroke={S.accent} strokeWidth={1} opacity={0.4} strokeDasharray="6,4"
              />
              {(() => {
                const bx = storyline.pointB.idx != null ? x(storyline.pointB.idx) : width - p.r;
                const by = y(storyline.pointB.price);
                const ax = x(storyline.pointA.idx);
                const ay = y(storyline.pointA.price);
                const angle = Math.atan2(by - ay, bx - ax);
                const sz = 6;
                return (
                  <polygon
                    points={`${bx},${by} ${bx - sz * Math.cos(angle - 0.4)},${by - sz * Math.sin(angle - 0.4)} ${bx - sz * Math.cos(angle + 0.4)},${by - sz * Math.sin(angle + 0.4)}`}
                    fill={S.accent} opacity={0.4}
                  />
                );
              })()}
              <text x={x(storyline.pointA.idx)} y={y(storyline.pointA.price) - 10}
                fill={S.accent} fontSize={9} textAnchor="middle" {...mono} opacity={0.7}>
                {storyline.pointA.label}
              </text>
              <text x={storyline.pointB.idx != null ? x(storyline.pointB.idx) : width - p.r}
                y={y(storyline.pointB.price) - 10}
                fill={S.accent} fontSize={9} textAnchor="middle" {...mono} opacity={0.7}>
                {storyline.pointB.label}
              </text>

              {storyline.vcMarker && (
                <g>
                  <circle cx={x(storyline.vcMarker.idx)} cy={y(storyline.vcMarker.price)}
                    r={3} stroke={S.accent} strokeWidth={1} fill="none" opacity={0.5} />
                  <text x={x(storyline.vcMarker.idx)} y={y(storyline.vcMarker.price) - 8}
                    fill={S.muted} fontSize={8} textAnchor="middle" {...mono} opacity={0.55}>
                    {storyline.vcMarker.label}
                  </text>
                </g>
              )}

              {(storyline.troubleAreas || []).map((ta, i) => (
                <g key={`ta${i}`}>
                  <rect x={p.l} y={y(ta.top)} width={cW} height={Math.max(2, y(ta.bot) - y(ta.top))}
                    fill={S.zoneFill} opacity={0.06}
                    stroke={S.zone} strokeDasharray="4,3" strokeWidth={0.8} />
                  <text x={width - p.r + 4} y={y(ta.top) + 10}
                    fill={S.muted} fontSize={8} {...mono} opacity={0.55}>
                    {ta.label}
                  </text>
                </g>
              ))}
            </g>
          )}

          {(() => {
            const last = candles[candles.length - 1][3];
            return (
              <g>
                <line x1={p.l} y1={y(last)} x2={width - p.r} y2={y(last)}
                  stroke={S.price} strokeWidth={0.5} strokeDasharray="2,3" opacity={0.2} />
                <rect x={width - p.r - 1} y={y(last) - 8} width={38} height={16}
                  fill={S.price} rx={2} opacity={0.85} />
                <text x={width - p.r + 18} y={y(last) + 4} fill={S.bg}
                  fontSize={9} textAnchor="middle" fontWeight="bold" {...mono}>{last}</text>
              </g>
            );
          })()}
        </svg>
      );
    }

    const TITLE = "ETHUSDT · H4";

    const candles = [
      [1948,2065,1922,2047],[2047,2090,2017,2044],[2044,2059,2024,2027],[2027,2041,1998,2009],[2009,2019,1988,1996],[1996,2001,1939,1961],[1961,1990,1930,1969],[1969,2014,1959,1986],[1986,2002,1959,1983],[1983,1999,1945,1961],[1961,2010,1951,2007],[2007,2093,2000,2055],[2055,2158,2036,2150],[2150,2199,2129,2178],[2178,2180,2117,2127],[2127,2142,2108,2120],[2120,2144,2096,2105],[2105,2164,2094,2138],[2138,2143,2068,2087],[2087,2094,2055,2074],[2074,2099,2070,2073],[2073,2093,2062,2084],[2084,2088,2059,2083],[2083,2083,2046,2051],[2051,2062,1966,1978],[1978,1993,1956,1984],[1984,1990,1969,1979],[1979,1996,1972,1980],[1980,1984,1964,1983],[1983,1995,1975,1989],[1989,1991,1970,1981],[1981,1983,1948,1955],[1955,1974,1955,1970],[1970,1977,1936,1948],[1948,1960,1930,1955],[1955,1980,1945,1951],[1951,1955,1925,1943],[1943,1971,1928,1965],[1965,1972,1916,1937],[1937,2006,1930,1977],[1977,2014,1963,1984],[1984,2022,1979,1992],[1992,2033,1992,2023],[2023,2054,2006,2034],[2034,2037,1989,1993],[1993,2054,1991,2027],[2027,2060,2026,2051],[2051,2074,2051,2062],[2062,2086,2009,2079],[2079,2081,2069,2078]
    ];

    const zones = [
      { "top": 2199, "bot": 2150, "originStart": 12, "originEnd": 14, "label": "D1 FH 2199", "note": "daily fractal high" },
      { "top": 2055, "bot": 2036, "originStart": 11, "originEnd": 12, "label": "H4 FVG 2055", "note": "bullish displacement" },
      { "top": 1977, "bot": 1937, "originStart": 38, "originEnd": 40, "label": "H4 FVG 1977", "note": "entry zone pullback" },
      { "top": 1960, "bot": 1930, "originStart": 34, "originEnd": 36, "label": "H4 SNR 1945", "note": "support cluster" },
      { "top": 1916, "bot": 1870, "originStart": 38, "originEnd": 39, "label": "D1 FL 1916", "note": "daily fractal low" }
    ];

    const levels = [
      { "val": 2199, "label": "D1 FH", "dash": false },
      { "val": 1980, "label": "H4 FH", "dash": true },
      { "val": 1916, "label": "D1 FL", "dash": true }
    ];

    const fractals = [
      { "idx": 0, "type": "low", "price": 1922 },
      { "idx": 13, "type": "high", "price": 2199 },
      { "idx": 24, "type": "low", "price": 1966 },
      { "idx": 38, "type": "low", "price": 1916 },
      { "idx": 45, "type": "high", "price": 2054 }
    ];

    const storyline = {
      "pointA": { "price": 1965, "label": "A: 1M RB", "idx": 9 },
      "pointB": { "price": 2199, "label": "B: D1 FH", "idx": null },
      "vcMarker": { "price": 1992, "label": "H4 VC ?", "confirmed": false, "idx": 41 },
      "troubleAreas": [{ "top": 2055, "bot": 2036, "label": "TA: H4 FVG" }]
    };

    function App() {
      const S = useTheme();

      return (
        <div style={{ background: S.bg, padding: "8px 0" }}>
          <div>
            <Chart
              candles={candles}
              zones={zones}
              levels={levels}
              fractals={fractals}
              storyline={storyline}
              title={TITLE}
            />
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<App />);
  </script>
</body>
</html>
