<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ETHUSDT · D1</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; overflow: hidden; }
  body { display: flex; align-items: center; justify-content: center; }
  svg { max-width: 100%; height: auto; }
  @media (prefers-color-scheme: dark) { body { background: #0a0a0a; } }
  @media (prefers-color-scheme: light) { body { background: #fafafa; } }
</style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script type="text/babel">
const {useState, useEffect} = React;

const DARK = {
  bg: "#0a0a0a", bull: "#e0e0e0", bear: "#606060", wick: "#4a4a4a",
  zone: "#555", zoneFill: "#ffffff", accent: "#a0a0a0", dim: "#2a2a2a",
  dimmer: "#151515", text: "#909090", muted: "#606060", price: "#d4d4d4",
};
const LIGHT = {
  bg: "#fafafa", bull: "#1a1a1a", bear: "#a0a0a0", wick: "#c0c0c0",
  zone: "#999999", zoneFill: "#000000", accent: "#555555", dim: "#e0e0e0",
  dimmer: "#f0f0f0", text: "#777777", muted: "#999999", price: "#1a1a1a",
};

function useTheme() {
  const [dark, setDark] = useState(() => {
    if (window.__forcedTheme !== undefined) return window.__forcedTheme === "dark";
    return typeof window !== "undefined" && window.matchMedia("(prefers-color-scheme: dark)").matches;
  });
  useEffect(() => {
    const mq = window.matchMedia("(prefers-color-scheme: dark)");
    const mqHandler = (e) => { if (window.__forcedTheme === undefined) setDark(e.matches); };
    mq.addEventListener("change", mqHandler);
    const msgHandler = (e) => {
      if (e.data && e.data.type === "theme") {
        const isDark = e.data.theme === "dark" || e.data.theme === "lime";
        window.__forcedTheme = isDark ? "dark" : "light";
        document.body.style.background = isDark ? "#0a0a0a" : "#fafafa";
        setDark(isDark);
      }
    };
    window.addEventListener("message", msgHandler);
    return () => {
      mq.removeEventListener("change", mqHandler);
      window.removeEventListener("message", msgHandler);
    };
  }, []);
  return dark ? DARK : LIGHT;
}

const mono = { fontFamily: "'SF Mono','Fira Code','Consolas',monospace" };

function Chart({ candles, zones, levels, fractals, title, width = 600, height = 380 }) {
  const S = useTheme();
  const p = { t: 32, b: 36, l: 52, r: 80 };
  const cW = width - p.l - p.r;
  const cH = height - p.t - p.b;
  if (!candles || candles.length === 0) return null;
  const allP = candles.flat();
  const dataHi = Math.max(...allP);
  const dataLo = Math.min(...allP);
  const margin = (dataHi - dataLo) * 0.08;
  const hi = dataHi + margin;
  const lo = dataLo - margin;
  const y = (v) => p.t + (1 - (v - lo) / (hi - lo)) * cH;
  const x = (i) => p.l + (i + 0.5) / candles.length * cW;
  const bw = Math.max(1.5, Math.min(5, cW / candles.length * 0.6));
  const range = hi - lo;
  const rawStep = range / 5;
  const mag = Math.pow(10, Math.floor(Math.log10(rawStep)));
  const steps = [1, 2, 5, 10];
  const step = steps.find(s => s * mag >= rawStep) * mag;
  const gridPrices = [];
  for (let pr = Math.ceil(lo / step) * step; pr <= hi; pr += step) gridPrices.push(pr);

  return (
    <svg width={width} height={height} style={{ display: "block", borderRadius: 8 }}>
      <rect width={width} height={height} fill={S.bg} rx={8} />
      {title && <text x={p.l + 2} y={20} fill={S.muted} fontSize={10} {...mono}>{title}</text>}
      {gridPrices.map((pr, i) => (
        <g key={`g${i}`}>
          <line x1={p.l} y1={y(pr)} x2={width - p.r} y2={y(pr)} stroke={S.dimmer} strokeWidth={0.5} />
          <text x={p.l - 6} y={y(pr) + 3} fill={S.muted} fontSize={9} textAnchor="end" {...mono}>{pr}</text>
        </g>
      ))}
      {(zones || []).map((z, zi) => {
        const ox1 = x(z.originStart) - bw;
        const ox2 = x(z.originEnd) + bw;
        const projX = width - p.r;
        const zH = Math.max(2, y(z.bot) - y(z.top));
        return (
          <g key={`z${zi}`}>
            <rect x={ox1} y={y(z.top)} width={ox2 - ox1} height={zH} fill={S.zoneFill} opacity={0.08} rx={1} />
            <rect x={ox2} y={y(z.top)} width={projX - ox2} height={zH} fill={S.zoneFill} opacity={0.04} />
            <line x1={ox1} y1={y(z.top)} x2={ox2} y2={y(z.top)} stroke={S.zone} strokeWidth={0.8} opacity={0.5} />
            <line x1={ox1} y1={y(z.bot)} x2={ox2} y2={y(z.bot)} stroke={S.zone} strokeWidth={0.8} opacity={0.5} />
            <line x1={ox2} y1={y(z.top)} x2={projX} y2={y(z.top)} stroke={S.zone} strokeWidth={0.5} opacity={0.2} strokeDasharray="3,4" />
            <line x1={ox2} y1={y(z.bot)} x2={projX} y2={y(z.bot)} stroke={S.zone} strokeWidth={0.5} opacity={0.2} strokeDasharray="3,4" />
            <text x={projX + 4} y={y(z.top) + 4} fill={S.accent} fontSize={9} fontWeight={600} {...mono} opacity={0.85}>{z.label}</text>
            <text x={projX + 4} y={y(z.bot) - 2} fill={S.muted} fontSize={8} {...mono} opacity={0.55}>{z.top}–{z.bot}</text>
          </g>
        );
      })}
      {(levels || []).map((l, i) => (
        <g key={`l${i}`}>
          <line x1={p.l} y1={y(l.val)} x2={width - p.r} y2={y(l.val)} stroke={S.zone} strokeWidth={0.4} opacity={0.2} strokeDasharray={l.dash ? "2,4" : "none"} />
          <text x={width - p.r + 4} y={y(l.val) + 3} fill={S.muted} fontSize={8} {...mono} opacity={0.55}>{l.label}</text>
        </g>
      ))}
      {candles.map(([o, h, l, c], i) => {
        const bull = c >= o;
        const cx = x(i);
        return (
          <g key={`c${i}`}>
            <line x1={cx} y1={y(h)} x2={cx} y2={y(l)} stroke={S.wick} strokeWidth={0.6} opacity={0.35} />
            <rect x={cx - bw / 2} y={y(Math.max(o, c))} width={bw} height={Math.max(0.5, Math.abs(y(o) - y(c)))} fill={bull ? S.bg : S.bear} stroke={bull ? S.bull : S.bear} strokeWidth={0.7} opacity={bull ? 0.9 : 0.7} />
          </g>
        );
      })}
      {(fractals || []).map((f, i) => {
        const cx = x(f.idx);
        const isHigh = f.type === "high";
        const cy = y(f.price) + (isHigh ? -8 : 10);
        return (
          <g key={`f${i}`}>
            <text x={cx} y={cy} fill={S.accent} fontSize={9} textAnchor="middle" {...mono} opacity={0.7}>{isHigh ? "▽" : "△"}</text>
            <text x={cx} y={cy + (isHigh ? -8 : 10)} fill={S.muted} fontSize={8} textAnchor="middle" {...mono} opacity={0.55}>{f.price}</text>
          </g>
        );
      })}
      {(() => {
        const last = candles[candles.length - 1][3];
        return (
          <g>
            <line x1={p.l} y1={y(last)} x2={width - p.r} y2={y(last)} stroke={S.price} strokeWidth={0.5} strokeDasharray="2,3" opacity={0.2} />
            <rect x={width - p.r - 1} y={y(last) - 8} width={38} height={16} fill={S.price} rx={2} opacity={0.85} />
            <text x={width - p.r + 18} y={y(last) + 4} fill={S.bg} fontSize={9} textAnchor="middle" fontWeight="bold" {...mono}>{last}</text>
          </g>
        );
      })()}
    </svg>
  );
}

// DATA SECTION
const TITLE = "ETHUSDT · D1";
const candles = [
  [1992,2039,1924,1956],[1956,1988,1907,1949],[1949,1981,1923,1969],
  [1969,1996,1956,1973],[1973,1983,1935,1958],[1958,1958,1837,1856],
  [1856,1870,1800,1852],[1852,2148,1847,2057],[2057,2083,1975,2028],
  [2028,2064,1887,1930],[1930,1985,1835,1965],[1965,2055,1907,1940],
  [1940,2090,1920,2027],[2027,2041,1930,1983],[1983,2199,1945,2127],
  [2127,2164,2055,2073],[2073,2093,1956,1979],[1979,1996,1948,1970],
  [1970,1980,1916,1937],[1937,2039,1930,2012]
];
const zones = [
  {"originStart":6,"originEnd":8,"top":1975,"bot":1870,"label":"D1 FVG","note":"bull displacement"},
  {"originStart":11,"originEnd":13,"top":2055,"bot":2041,"label":"D1 IFVG","note":"inefficiency"}
];
const levels = [
  {"val":2199,"label":"D1 Strong High","dash":false},
  {"val":1800,"label":"W1 KL / D1 SL","dash":false},
  {"val":2395,"label":"W1 FVG target","dash":true},
  {"val":2519,"label":"1M EQ","dash":true}
];
const fractals = [
  {"idx":7,"type":"high","price":2148},
  {"idx":14,"type":"high","price":2199},
  {"idx":6,"type":"low","price":1800},
  {"idx":7,"type":"low","price":1847},
  {"idx":10,"type":"low","price":1835},
  {"idx":9,"type":"low","price":1907}
];

// APP
function App() {
  const S = useTheme();
  return (
    <div style={{ background: S.bg, padding: "8px 0", ...mono, color: S.price }}>
      <div style={{ margin: "0 auto" }}>
        <Chart candles={candles} zones={zones} levels={levels} fractals={fractals} title={TITLE} />
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
